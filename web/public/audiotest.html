<!DOCTYPE html>
<html>
<head><title>Safari Audio Test</title>
<style>
  body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
  button { font-size: 18px; padding: 10px 20px; margin: 5px; cursor: pointer; }
  h3 { color: #ff0; margin-top: 20px; }
  #log { white-space: pre-wrap; margin-top: 20px; border: 1px solid #333; padding: 10px; max-height: 400px; overflow-y: auto; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
</head>
<body>
<h2>Safari Audio Test — 3 Approaches</h2>

<h3>A) HTML5 Audio (clone + play)</h3>
<button onclick="testA_sfx()">SFX</button>
<button onclick="testA_music()">Music</button>
<button onclick="testA_stop()">Stop</button>

<h3>B) Web Audio with silent-buffer unlock</h3>
<p>Click "Unlock" first, then play.</p>
<button onclick="testB_unlock()">Unlock (silent buffer)</button>
<button onclick="testB_sfx()">SFX</button>

<h3>C) Howler.js (industry standard)</h3>
<button onclick="testC_sfx()">SFX</button>
<button onclick="testC_music()">Music</button>
<button onclick="testC_stop()">Stop</button>

<div id="log"></div>

<script>
function log(msg) {
  const el = document.getElementById('log');
  el.textContent += new Date().toLocaleTimeString() + ' ' + msg + '\n';
  el.scrollTop = el.scrollHeight;
}

/* ── A) HTML5 Audio ── */
let sfxA = null, musicA = null;
const a1 = new Audio('assets/sounds/PlayerGun1.mp3');
a1.preload = 'auto';
a1.oncanplaythrough = () => { sfxA = a1; log('[A] SFX loaded'); };
a1.onerror = () => log('[A] SFX load ERROR');
a1.load();
const a2 = new Audio('assets/sounds/Level2.mp3');
a2.preload = 'auto';
a2.oncanplaythrough = () => { musicA = a2; log('[A] Music loaded'); };
a2.onerror = () => log('[A] Music load ERROR');
a2.load();

function testA_sfx() {
  if (!sfxA) { log('[A] SFX not loaded'); return; }
  const c = sfxA.cloneNode(true);
  c.volume = 0.7;
  c.play().then(() => log('[A] SFX playing!')).catch(e => log('[A] SFX error: ' + e.message));
}
function testA_music() {
  if (!musicA) { log('[A] Music not loaded'); return; }
  musicA.loop = true; musicA.volume = 0.5; musicA.currentTime = 0;
  musicA.play().then(() => log('[A] Music playing!')).catch(e => log('[A] Music error: ' + e.message));
}
function testA_stop() {
  if (musicA) { musicA.pause(); musicA.currentTime = 0; log('[A] Stopped'); }
}

/* ── B) Web Audio with silent unlock ── */
let ctxB = null, bufB = null;

function testB_unlock() {
  log('[B] Unlocking...');
  ctxB = new (window.AudioContext || window.webkitAudioContext)();
  // Play a silent buffer to unlock Safari
  const silent = ctxB.createBuffer(1, 1, 22050);
  const src = ctxB.createBufferSource();
  src.buffer = silent;
  src.connect(ctxB.destination);
  src.start(0);
  ctxB.resume().then(() => log('[B] Context state: ' + ctxB.state));

  // Pre-fetch SFX
  fetch('assets/sounds/PlayerGun1.mp3')
    .then(r => r.arrayBuffer())
    .then(ab => ctxB.decodeAudioData(ab))
    .then(buf => { bufB = buf; log('[B] SFX decoded: ' + buf.duration.toFixed(2) + 's'); })
    .catch(e => log('[B] Decode error: ' + e.message));
}

function testB_sfx() {
  if (!ctxB || !bufB) { log('[B] Click Unlock first'); return; }
  const src = ctxB.createBufferSource();
  src.buffer = bufB;
  src.connect(ctxB.destination);
  src.start(0);
  log('[B] SFX playing! (ctx: ' + ctxB.state + ')');
}

/* ── C) Howler.js ── */
let howlSfx = null, howlMusic = null;
try {
  howlSfx = new Howl({ src: ['assets/sounds/PlayerGun1.mp3'], preload: true,
    onload: () => log('[C] SFX loaded'), onloaderror: (id, e) => log('[C] SFX error: ' + e) });
  howlMusic = new Howl({ src: ['assets/sounds/Level2.mp3'], preload: true, loop: true, volume: 0.5,
    onload: () => log('[C] Music loaded'), onloaderror: (id, e) => log('[C] Music error: ' + e) });
} catch(e) { log('[C] Howler init error: ' + e.message); }

function testC_sfx() {
  if (!howlSfx) return;
  howlSfx.play();
  log('[C] SFX play called');
}
function testC_music() {
  if (!howlMusic) return;
  howlMusic.play();
  log('[C] Music play called');
}
function testC_stop() {
  if (howlMusic) { howlMusic.stop(); log('[C] Stopped'); }
}

log('User agent: ' + navigator.userAgent);
log('Loading audio...');
</script>
</body>
</html>
